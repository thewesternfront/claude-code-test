<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe Boyeeee</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #333333;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #d3d3d3;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #ffffff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 110px);
      gap: 6px;
    }

    .cell {
      background: #d3d3d35b;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #669de0;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #5c95da;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 1.1rem;
    }

    .score-box {
      text-align: center;
      background: #03ff3973;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
    }

    .score-box span {
      display: block;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #aaa; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.5rem 1.4rem;
      font-size: 0.9rem;
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc44;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #mode-toggle:hover {
      background: #16213e;
    }

    #difficulty-wrap {
      margin-top: 0.8rem;
      display: none;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      font-size: 0.9rem;
    }

    #difficulty-wrap.visible {
      display: flex;
    }

    #difficulty {
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #a8dadc44;
      background: #0f3460;
      color: #a8dadc;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>

  <div id="score">
    <div class="score-box x-score">X <span id="score-x">0</span></div>
    <div class="score-box draw-score">Draw <span id="score-draw">0</span></div>
    <div class="score-box o-score">O <span id="score-o">0</span></div>
  </div>

  <button id="reset">New Game</button>
  <button id="mode-toggle">Mode: 2 Players</button>
  <div id="difficulty-wrap">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
      <option value="beginner">Beginner</option>
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="advanced" selected>Advanced</option>
    </select>
  </div>

  <script>
    const WINNING_LINES = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsAI;
    let scores = { X: 0, O: 0, Draw: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const modeBtn = document.getElementById('mode-toggle');
    const diffWrap = document.getElementById('difficulty-wrap');
    const diffSelect = document.getElementById('difficulty');

    vsAI = false;

    function initBoard() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      statusEl.textContent = `Player X's turn`;
      renderBoard();
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsAI && current === 'O') return;
      makeMove(i);
    }

    function makeMove(i) {
      board[i] = current;
      renderBoard();
      const result = checkResult();
      if (result) return endGame(result);
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = `Player ${current}'s turn`;
      if (vsAI && current === 'O' && !gameOver) {
        setTimeout(aiMove, 300);
      }
    }

    function aiMove() {
      const move = bestMove();
      if (move !== null) makeMove(move);
    }

    function randomMove() {
      const empty = board.map((v, i) => v ? null : i).filter(i => i !== null);
      return empty[Math.floor(Math.random() * empty.length)] ?? null;
    }

    function bestMove() {
      const diff = diffSelect.value;

      // Beginner: fully random
      if (diff === 'beginner') return randomMove();

      // Easy: 70% random, 30% smart
      if (diff === 'easy') {
        return Math.random() < 0.7 ? randomMove() : smartMove();
      }

      // Medium: 30% random, 70% smart
      if (diff === 'medium') {
        return Math.random() < 0.3 ? randomMove() : smartMove();
      }

      // Advanced: always minimax
      return smartMove();
    }

    function smartMove() {
      let best = -Infinity, idx = null;
      board.forEach((v, i) => {
        if (!v) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > best) { best = score; idx = i; }
        }
      });
      return idx;
    }

    function minimax(b, depth, isMax) {
      const winner = getWinner(b);
      if (winner === 'O') return 10 - depth;
      if (winner === 'X') return depth - 10;
      if (b.every(v => v)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = null;
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((v, i) => {
          if (!v) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = null;
          }
        });
        return best;
      }
    }

    function getWinner(b) {
      for (const [a, c, d] of WINNING_LINES) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
      }
      return null;
    }

    function checkResult() {
      for (const line of WINNING_LINES) {
        const [a, b2, c] = line;
        if (board[a] && board[a] === board[b2] && board[a] === board[c]) {
          return { winner: board[a], line };
        }
      }
      if (board.every(v => v)) return { winner: null };
      return null;
    }

    function endGame({ winner, line }) {
      gameOver = true;
      if (winner) {
        scores[winner]++;
        updateScores();
        statusEl.textContent = `Player ${winner} wins!`;
        if (line) {
          line.forEach(i => boardEl.children[i].classList.add('win'));
        }
      } else {
        scores.Draw++;
        updateScores();
        statusEl.textContent = "It's a draw!";
      }
    }

    function updateScores() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-draw').textContent = scores.Draw;
    }

    document.getElementById('reset').addEventListener('click', initBoard);

    modeBtn.addEventListener('click', () => {
      vsAI = !vsAI;
      modeBtn.textContent = vsAI ? 'Mode: vs AI' : 'Mode: 2 Players';
      diffWrap.classList.toggle('visible', vsAI);
      scores = { X: 0, O: 0, Draw: 0 };
      updateScores();
      initBoard();
    });

    diffSelect.addEventListener('change', () => {
      scores = { X: 0, O: 0, Draw: 0 };
      updateScores();
      initBoard();
    });

    initBoard();
  </script>
</body>
</html>
