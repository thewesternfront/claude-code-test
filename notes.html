<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1e1e1e;
      --sidebar-bg: #252526;
      --toolbar-bg: #2d2d30;
      --accent: #0078d4;
      --accent-active: #094771;
      --border: #3e3e42;
      --text: #d4d4d4;
      --text-muted: #858585;
      --text-dim: #555;
      --statusbar-bg: #007acc;
      --hover-bg: #2a2d2e;
      --danger: #f14c4c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    #sidebar-header .app-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #btn-add-notebook {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }

    #btn-add-notebook:hover {
      background: var(--hover-bg);
      color: var(--text);
    }

    #notebook-list {
      list-style: none;
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    #notebook-list::-webkit-scrollbar { width: 6px; }
    #notebook-list::-webkit-scrollbar-track { background: transparent; }
    #notebook-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .notebook-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.12s;
      user-select: none;
    }

    .notebook-item:hover {
      background: var(--hover-bg);
    }

    .notebook-item.active {
      background: var(--accent-active);
    }

    .notebook-item.active .notebook-label {
      color: #fff;
    }

    .notebook-label {
      font-size: 13.5px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .notebook-rename-input {
      font-size: 13.5px;
      font-family: inherit;
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 1px 4px;
      outline: none;
    }

    .notebook-delete {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.1s, color 0.1s, background 0.1s;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .notebook-item:hover .notebook-delete {
      opacity: 1;
    }

    .notebook-delete:hover {
      background: rgba(241, 76, 76, 0.2);
      color: var(--danger);
    }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 2px;
      padding: 5px 8px;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tb-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 4px 7px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      line-height: 1.3;
      white-space: nowrap;
    }

    .tb-btn:hover {
      background: var(--hover-bg);
      border-color: var(--border);
    }

    .tb-btn.active {
      background: var(--accent-active);
      border-color: var(--accent);
      color: #fff;
    }

    .tb-btn b { font-weight: 700; }
    .tb-btn i { font-style: italic; }
    .tb-btn u { text-decoration: underline; }
    .tb-btn s { text-decoration: line-through; }

    .tb-select {
      background: var(--toolbar-bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12.5px;
      font-family: inherit;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.12s;
    }

    .tb-select:hover,
    .tb-select:focus {
      border-color: var(--accent);
    }

    .tb-color-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .tb-color {
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      padding: 1px;
    }

    .tb-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── Editor header ── */
    #editor-header {
      padding: 14px 40px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #notebook-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    #notebook-title::placeholder {
      color: var(--text-dim);
    }

    /* ── Editor ── */
    #editor-wrap {
      flex: 1;
      overflow-y: auto;
    }

    #editor-wrap::-webkit-scrollbar { width: 8px; }
    #editor-wrap::-webkit-scrollbar-track { background: transparent; }
    #editor-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    #editor {
      min-height: 100%;
      padding: 20px 40px 40px;
      outline: none;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
    }

    #editor:empty::before {
      content: 'Start typing…';
      color: var(--text-dim);
      pointer-events: none;
    }

    #editor ul, #editor ol {
      padding-left: 1.6em;
    }

    #editor p { margin-bottom: 0.3em; }

    /* ── Statusbar ── */
    #statusbar {
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      background: var(--statusbar-bg);
      color: #fff;
      font-size: 12px;
      flex-shrink: 0;
      gap: 8px;
    }

    #statusbar .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #statusbar .right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-msg {
      opacity: 0;
      transition: opacity 0.3s;
      font-style: italic;
    }

    #status-msg.visible {
      opacity: 1;
    }

    .sb-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 11.5px;
      font-family: inherit;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .sb-btn:hover {
      background: rgba(255,255,255,0.28);
    }

    /* ── Context Menu ── */
    #ctx-menu {
      position: fixed;
      display: none;
      background: #2d2d30;
      border: 1px solid #3e3e42;
      border-radius: 6px;
      padding: 10px;
      z-index: 9999;
      min-width: 168px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      user-select: none;
    }

    .ctx-section {
      font-size: 10px;
      font-weight: 600;
      color: #858585;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 1px 5px;
    }

    .ctx-sep {
      height: 1px;
      background: #3e3e42;
      margin: 7px 0;
    }

    .ctx-color-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .ctx-color-swatch {
      width: 30px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      padding: 0;
    }

    .ctx-color-swatch:hover {
      transform: scale(1.12);
      border-color: rgba(255,255,255,0.55);
    }

    .ctx-format-btns {
      display: flex;
      gap: 4px;
    }

    .ctx-fmt-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      font-size: 13px;
      font-family: inherit;
      padding: 4px 2px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, border-color 0.12s;
      line-height: 1.3;
    }

    .ctx-fmt-btn:hover {
      background: #3e3e42;
      border-color: #555;
    }

    .ctx-select {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      font-size: 12.5px;
      font-family: inherit;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      margin-top: 5px;
    }

    .ctx-select:hover,
    .ctx-select:focus {
      border-color: #0078d4;
    }

    .ctx-action-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      font-size: 12.5px;
      font-family: inherit;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s;
    }

    .ctx-action-btn:hover {
      background: #3e3e42;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <span class="app-title">Notebooks</span>
      <button id="btn-add-notebook" title="New Notebook">+</button>
    </div>
    <ul id="notebook-list"></ul>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Toolbar -->
    <div id="toolbar">
      <!-- Text style -->
      <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
      <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
      <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
      <button class="tb-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>

      <span class="tb-sep"></span>

      <!-- Lists -->
      <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet List">&#8226; List</button>
      <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered List">1. List</button>

      <span class="tb-sep"></span>

      <!-- Alignment -->
      <button class="tb-btn" data-cmd="justifyLeft" title="Align Left">&#8676; Left</button>
      <button class="tb-btn" data-cmd="justifyCenter" title="Align Center">&#8596; Center</button>
      <button class="tb-btn" data-cmd="justifyRight" title="Align Right">&#8677; Right</button>

      <span class="tb-sep"></span>

      <!-- Font family -->
      <select class="tb-select" id="sel-font" title="Font Family">
        <option value="">Font</option>
        <option value="Inter, sans-serif">Inter</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
      </select>

      <!-- Font size -->
      <select class="tb-select" id="sel-size" title="Font Size">
        <option value="">Size</option>
        <option value="1">Small (10pt)</option>
        <option value="2">Normal (13pt)</option>
        <option value="3">Medium (16pt)</option>
        <option value="4">Large (18pt)</option>
        <option value="5">X-Large (24pt)</option>
        <option value="6">XX-Large (32pt)</option>
        <option value="7">Huge (48pt)</option>
      </select>

      <span class="tb-sep"></span>

      <!-- Colors -->
      <label class="tb-color-wrap" title="Text Color">
        A
        <input type="color" class="tb-color" id="color-text" value="#d4d4d4">
      </label>
      <label class="tb-color-wrap" title="Highlight Color">
        <span style="background:#ffdd00;color:#000;padding:0 2px;border-radius:2px;font-size:11px;">HL</span>
        <input type="color" class="tb-color" id="color-highlight" value="#ffdd00">
      </label>

      <span class="tb-sep"></span>

      <!-- Clear -->
      <button class="tb-btn" data-cmd="removeFormat" title="Clear Formatting">Clear</button>
    </div>

    <!-- Editor header -->
    <div id="editor-header">
      <input id="notebook-title" type="text" placeholder="Notebook title" autocomplete="off" spellcheck="false">
    </div>

    <!-- Editor -->
    <div id="editor-wrap">
      <div id="editor" contenteditable="true" spellcheck="true"></div>
    </div>

    <!-- Statusbar -->
    <div id="statusbar">
      <div class="left">
        <span id="word-count">0 words</span>
        <span id="status-msg"></span>
      </div>
      <div class="right">
        <button class="sb-btn" id="btn-load">Load File</button>
        <button class="sb-btn" id="btn-save">Save File</button>
      </div>
    </div>

  </div>
</div>

<!-- Hidden file input for load -->
<input type="file" id="file-input" accept=".json" style="display:none">

<!-- Context Menu -->
<div id="ctx-menu">
  <div class="ctx-section">Text Color</div>
  <div class="ctx-color-grid" id="ctx-color-grid"></div>

  <div class="ctx-sep"></div>

  <div class="ctx-section">Formatting</div>
  <div class="ctx-format-btns">
    <button class="ctx-fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
    <button class="ctx-fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
    <button class="ctx-fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
    <button class="ctx-fmt-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
  </div>

  <div class="ctx-sep"></div>

  <div class="ctx-section">Alignment</div>
  <div class="ctx-format-btns">
    <button class="ctx-fmt-btn" data-cmd="justifyLeft" title="Align Left">&#8676; Left</button>
    <button class="ctx-fmt-btn" data-cmd="justifyCenter" title="Align Center">&#8596; Center</button>
    <button class="ctx-fmt-btn" data-cmd="justifyRight" title="Align Right">&#8677; Right</button>
  </div>

  <div class="ctx-sep"></div>

  <div class="ctx-section">Lists</div>
  <div class="ctx-format-btns">
    <button class="ctx-fmt-btn" data-cmd="insertUnorderedList" title="Bullet List">&#8226; Bullet</button>
    <button class="ctx-fmt-btn" data-cmd="insertOrderedList" title="Numbered List">1. Number</button>
  </div>

  <div class="ctx-sep"></div>

  <div class="ctx-section">Font</div>
  <select class="ctx-select" id="ctx-font">
    <option value="">Font Family</option>
    <option value="Inter, sans-serif">Inter</option>
    <option value="Arial, sans-serif">Arial</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="'Courier New', monospace">Courier New</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
    <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
  </select>
  <select class="ctx-select" id="ctx-size">
    <option value="">Font Size</option>
    <option value="1">Small (10pt)</option>
    <option value="2">Normal (13pt)</option>
    <option value="3">Medium (16pt)</option>
    <option value="4">Large (18pt)</option>
    <option value="5">X-Large (24pt)</option>
    <option value="6">XX-Large (32pt)</option>
    <option value="7">Huge (48pt)</option>
  </select>

  <div class="ctx-sep"></div>

  <button class="ctx-action-btn" id="ctx-clear">Clear Formatting</button>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────────

  const STORAGE_KEY = 'notes-app-state';

  let state = { notebooks: [], activeId: null };
  let lastRenderedId = null;
  let autoSaveTimer = null;
  let statusTimer = null;

  function genId() {
    return (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function defaultState() {
    const id = genId();
    return {
      notebooks: [{
        id,
        name: 'My First Notebook',
        content: '<p><b>Welcome to Notes!</b></p><p>This is your personal notebook. Start typing here, or use the toolbar above to format your text.</p><p></p><ul><li>Create new notebooks in the left sidebar</li><li>Double-click a notebook name to rename it</li><li>Use <b>Save File</b> to export your notes as JSON</li><li>Press <b>Ctrl+S</b> as a shortcut to save</li></ul>',
        createdAt: Date.now(),
        updatedAt: Date.now()
      }],
      activeId: id
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.notebooks) && parsed.notebooks.length > 0) {
          state = parsed;
          return;
        }
      }
    } catch (_) {}
    state = defaultState();
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function getActiveNotebook() {
    return state.notebooks.find(n => n.id === state.activeId) || state.notebooks[0];
  }

  // ── Render ───────────────────────────────────────────────────────────────

  const notebookList = document.getElementById('notebook-list');
  const editor = document.getElementById('editor');
  const notebookTitle = document.getElementById('notebook-title');
  const wordCountEl = document.getElementById('word-count');

  function render() {
    // Rebuild sidebar list
    notebookList.innerHTML = '';
    state.notebooks.forEach(nb => {
      const li = document.createElement('li');
      li.className = 'notebook-item' + (nb.id === state.activeId ? ' active' : '');
      li.dataset.id = nb.id;

      const label = document.createElement('span');
      label.className = 'notebook-label';
      label.textContent = nb.name;
      label.title = nb.name;

      const del = document.createElement('button');
      del.className = 'notebook-delete';
      del.textContent = '×';
      del.title = 'Delete notebook';
      del.addEventListener('click', e => {
        e.stopPropagation();
        deleteNotebook(nb.id);
      });

      li.appendChild(label);
      li.appendChild(del);

      li.addEventListener('click', () => selectNotebook(nb.id));
      label.addEventListener('dblclick', e => {
        e.stopPropagation();
        beginRename(nb.id, li, label);
      });

      notebookList.appendChild(li);
    });

    // Update editor header title
    const active = getActiveNotebook();
    notebookTitle.value = active ? active.name : '';

    // Only repopulate editor content when active notebook actually changed
    if (state.activeId !== lastRenderedId) {
      editor.innerHTML = active ? (active.content || '') : '';
      lastRenderedId = state.activeId;
    }

    updateWordCount();
  }

  function updateWordCount() {
    const text = editor.innerText || '';
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    wordCountEl.textContent = words === 1 ? '1 word' : words + ' words';
  }

  // ── Notebook CRUD ────────────────────────────────────────────────────────

  function addNotebook() {
    flushEditorContent();
    const id = genId();
    state.notebooks.push({
      id,
      name: 'New Notebook',
      content: '',
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
    state.activeId = id;
    lastRenderedId = null;
    saveState();
    render();
    // Immediately enter rename mode for the new notebook
    const newLi = notebookList.querySelector(`[data-id="${id}"]`);
    if (newLi) {
      const label = newLi.querySelector('.notebook-label');
      beginRename(id, newLi, label);
    }
  }

  function selectNotebook(id) {
    if (id === state.activeId) return;
    flushEditorContent();
    state.activeId = id;
    render();
  }

  function deleteNotebook(id) {
    if (state.notebooks.length <= 1) {
      showStatus('Cannot delete the last notebook');
      return;
    }
    const idx = state.notebooks.findIndex(n => n.id === id);
    state.notebooks.splice(idx, 1);
    if (state.activeId === id) {
      state.activeId = state.notebooks[Math.max(0, idx - 1)].id;
      lastRenderedId = null;
    }
    saveState();
    render();
    showStatus('Notebook deleted');
  }

  function beginRename(id, li, label) {
    const nb = state.notebooks.find(n => n.id === id);
    if (!nb) return;

    const input = document.createElement('input');
    input.className = 'notebook-rename-input';
    input.value = nb.name;
    input.maxLength = 80;

    li.replaceChild(input, label);
    input.focus();
    input.select();

    function commit() {
      const val = input.value.trim();
      if (val) nb.name = val;
      saveState();
      // Restore label
      label.textContent = nb.name;
      label.title = nb.name;
      li.replaceChild(label, input);
      if (nb.id === state.activeId) {
        notebookTitle.value = nb.name;
      }
    }

    function cancel() {
      label.textContent = nb.name;
      label.title = nb.name;
      li.replaceChild(label, input);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', commit); cancel(); }
    });
  }

  function flushEditorContent() {
    const active = getActiveNotebook();
    if (active) {
      active.content = editor.innerHTML;
      active.updatedAt = Date.now();
    }
  }

  // ── Auto-save ────────────────────────────────────────────────────────────

  function onEditorInput() {
    const active = getActiveNotebook();
    if (active) {
      active.content = editor.innerHTML;
      active.updatedAt = Date.now();
    }
    updateWordCount();
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      saveState();
      showStatus('Auto-saved');
    }, 800);
  }

  // ── Toolbar ──────────────────────────────────────────────────────────────

  const toggleCmds = ['bold', 'italic', 'underline', 'strikeThrough',
                      'insertUnorderedList', 'insertOrderedList',
                      'justifyLeft', 'justifyCenter', 'justifyRight'];

  document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault(); // keep editor focus
      document.execCommand(btn.dataset.cmd, false, null);
      updateToolbarState();
    });
  });

  document.getElementById('sel-font').addEventListener('change', function() {
    if (!this.value) return;
    document.execCommand('fontName', false, this.value);
    editor.focus();
    this.value = '';
  });

  document.getElementById('sel-size').addEventListener('change', function() {
    if (!this.value) return;
    document.execCommand('fontSize', false, this.value);
    editor.focus();
    this.value = '';
  });

  document.getElementById('color-text').addEventListener('input', function() {
    document.execCommand('foreColor', false, this.value);
    editor.focus();
  });

  document.getElementById('color-highlight').addEventListener('input', function() {
    document.execCommand('hiliteColor', false, this.value);
    editor.focus();
  });

  function updateToolbarState() {
    document.querySelectorAll('.tb-btn[data-cmd]').forEach(btn => {
      const cmd = btn.dataset.cmd;
      if (toggleCmds.includes(cmd)) {
        try {
          btn.classList.toggle('active', document.queryCommandState(cmd));
        } catch (_) {}
      }
    });
  }

  document.addEventListener('selectionchange', updateToolbarState);

  // ── Notebook title input ─────────────────────────────────────────────────

  notebookTitle.addEventListener('input', function() {
    const active = getActiveNotebook();
    if (active) {
      active.name = this.value || 'Untitled';
      // Update sidebar label
      const li = notebookList.querySelector(`[data-id="${active.id}"]`);
      if (li) {
        const label = li.querySelector('.notebook-label');
        if (label) {
          label.textContent = active.name;
          label.title = active.name;
        }
      }
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => { saveState(); showStatus('Auto-saved'); }, 800);
    }
  });

  // ── File Save / Load ─────────────────────────────────────────────────────

  async function saveToFile() {
    flushEditorContent();
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });

    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'my-notes.json',
          types: [{ description: 'Notes JSON', accept: { 'application/json': ['.json'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        showStatus('Saved successfully');
      } catch (err) {
        if (err.name !== 'AbortError') showStatus('Save failed');
      }
    } else {
      // Fallback: trigger download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-notes.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showStatus('Downloaded to your default folder');
    }
  }

  function loadFromFile() {
    document.getElementById('file-input').click();
  }

  document.getElementById('file-input').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (parsed && Array.isArray(parsed.notebooks) && parsed.notebooks.length > 0) {
          state = parsed;
          lastRenderedId = null;
          saveState();
          render();
          showStatus('Notes loaded from file');
        } else {
          showStatus('Invalid notes file');
        }
      } catch (_) {
        showStatus('Could not read file');
      }
    };
    reader.readAsText(file);
    this.value = '';
  });

  document.getElementById('btn-save').addEventListener('click', saveToFile);
  document.getElementById('btn-load').addEventListener('click', loadFromFile);
  document.getElementById('btn-add-notebook').addEventListener('click', addNotebook);

  // ── Keyboard shortcuts ───────────────────────────────────────────────────

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveToFile();
    }
  });

  // ── Status message ───────────────────────────────────────────────────────

  const statusMsg = document.getElementById('status-msg');

  function showStatus(msg) {
    clearTimeout(statusTimer);
    statusMsg.textContent = msg;
    statusMsg.classList.add('visible');
    statusTimer = setTimeout(() => {
      statusMsg.classList.remove('visible');
    }, 2500);
  }

  // ── Context Menu ─────────────────────────────────────────────────────────

  const ctxMenu = document.getElementById('ctx-menu');
  let ctxSavedRange = null;

  const CTX_PALETTE = [
    '#ffffff', '#d4d4d4', '#969696', '#4a4a4a',
    '#ff6b6b', '#ff9f43', '#ffd93d', '#6bcb77',
    '#4ecdc4', '#45b7d1', '#4a90d9', '#a855f7',
    '#ec4899', '#f43f5e', '#84cc16', '#06b6d4',
  ];

  // Build color grid
  const ctxColorGrid = document.getElementById('ctx-color-grid');
  CTX_PALETTE.forEach(color => {
    const swatch = document.createElement('button');
    swatch.className = 'ctx-color-swatch';
    swatch.style.background = color;
    swatch.title = color;
    swatch.addEventListener('mousedown', e => {
      e.preventDefault();
      ctxRestoreSelection();
      document.execCommand('foreColor', false, color);
      ctxHide();
    });
    ctxColorGrid.appendChild(swatch);
  });

  function ctxSaveSelection() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      ctxSavedRange = sel.getRangeAt(0).cloneRange();
    }
  }

  function ctxRestoreSelection() {
    if (ctxSavedRange) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(ctxSavedRange);
    }
  }

  function ctxShow(x, y) {
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top = y + 'px';
    ctxMenu.style.display = 'block';
    // Clamp so menu stays inside viewport
    const rect = ctxMenu.getBoundingClientRect();
    if (rect.right > window.innerWidth - 8) {
      ctxMenu.style.left = Math.max(8, x - rect.width) + 'px';
    }
    if (rect.bottom > window.innerHeight - 8) {
      ctxMenu.style.top = Math.max(8, y - rect.height) + 'px';
    }
  }

  function ctxHide() {
    ctxMenu.style.display = 'none';
  }

  editor.addEventListener('contextmenu', e => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.toString().trim() === '') {
      ctxHide();
      return;
    }
    e.preventDefault();
    ctxSaveSelection();
    ctxShow(e.clientX, e.clientY);
  });

  document.addEventListener('mousedown', e => {
    if (!ctxMenu.contains(e.target)) {
      ctxHide();
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') ctxHide();
  });

  // Formatting buttons
  document.querySelectorAll('.ctx-fmt-btn[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      ctxRestoreSelection();
      document.execCommand(btn.dataset.cmd, false, null);
      ctxHide();
    });
  });

  // Font family
  document.getElementById('ctx-font').addEventListener('change', function() {
    if (!this.value) return;
    ctxRestoreSelection();
    document.execCommand('fontName', false, this.value);
    this.value = '';
    ctxHide();
  });

  // Font size
  document.getElementById('ctx-size').addEventListener('change', function() {
    if (!this.value) return;
    ctxRestoreSelection();
    document.execCommand('fontSize', false, this.value);
    this.value = '';
    ctxHide();
  });

  // Clear formatting
  document.getElementById('ctx-clear').addEventListener('mousedown', e => {
    e.preventDefault();
    ctxRestoreSelection();
    document.execCommand('removeFormat', false, null);
    ctxHide();
  });

  // ── Editor events ────────────────────────────────────────────────────────

  editor.addEventListener('input', onEditorInput);

  // ── Init ─────────────────────────────────────────────────────────────────

  loadState();
  render();
  editor.focus();
</script>
</body>
</html>
